<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Klausur-Trainer · Digitaltechnik">
  <title>Klausur-Trainer · Digitaltechnik</title>

  <!-- Vollflaechige (full-bleed), DECKENDE Variante fuer iOS apple-touch-icon und
       maskable PWA-Icons: KEINE abgerundeten Ecken, KEINE Transparenz.
       iOS/Android legen selbst eine abgerundete Maske drueber - transparente Ecken
       wuerden sonst auf dem Homescreen schwarz erscheinen. -->
  <defs>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="100%" height="100%" fill="url(#teal)"/>

  <!-- Identisches "01" wie im Master-Icon, zentriert. Liegt im inneren
       ~60%-Sicherheitsbereich und bleibt damit auch nach iOS-Maskierung sichtbar. -->
  <g fill="none" stroke="#04231f" stroke-width="50" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="176" cy="256" rx="64" ry="108"/>
    <path d="M 300 200 L 342 150 L 342 362"/>
    <path d="M 298 362 L 388 362"/>
  </g>
</svg>
